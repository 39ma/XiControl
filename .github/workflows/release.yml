# Автосборка релиза: git tag v* → GitHub Release с готовыми exe.
#   git tag v0.2.0 && git push origin v0.2.0
name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch: # ручной запуск для проверки сборки (без публикации релиза)

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Самодостаточный single-file: не требует установленного .NET (~70 МБ)
      - name: Publish self-contained
        run: |
          $ver = $env:GITHUB_REF_NAME -replace '^v',''
          if ($ver -notmatch '^\d') { $ver = '0.0.0' }  # workflow_dispatch без тега
          dotnet publish src/XiControl.csproj -c Release -r win-x64 --self-contained `
            -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true -p:Version=$ver `
            -o publish/standalone
          Copy-Item publish/standalone/XiControl.exe "XiControl-$env:GITHUB_REF_NAME-win-x64.exe"

      # Лёгкий вариант: требует .NET 8 Desktop Runtime (~2 МБ)
      - name: Publish framework-dependent
        run: |
          $ver = $env:GITHUB_REF_NAME -replace '^v',''
          if ($ver -notmatch '^\d') { $ver = '0.0.0' }
          dotnet publish src/XiControl.csproj -c Release -r win-x64 --no-self-contained `
            -p:PublishSingleFile=true -p:Version=$ver `
            -o publish/framework
          Copy-Item publish/framework/XiControl.exe "XiControl-$env:GITHUB_REF_NAME-win-x64-net8.exe"

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: XiControl-*.exe
          generate_release_notes: true
          # тег с суффиксом через дефис (v0.7.0-pre) → пометить как pre-release,
          # чтобы не срабатывал winget-workflow (он слушает release types: [released])
          prerelease: ${{ contains(github.ref_name, '-') }}
